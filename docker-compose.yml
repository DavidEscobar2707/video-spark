services:
  api:
    build:
      context: .
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file:
      - ${BACKEND_ENV_FILE:-.env}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests

  worker:
    build:
      context: .
    command: ["uv", "run", "python", "-m", "app.worker"]
    env_file:
      - ${BACKEND_ENV_FILE:-.env}
    volumes:
      - ./app:/app/app
      - ./.artifacts:/tmp/videospark-worker
